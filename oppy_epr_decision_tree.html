<style>

    --no:#D85A30;--no-bg:#FAECE7;--no-txt:#4A1B0C;
    --rev:#7F77DD;--rev-bg:#EEEDFE;--rev-txt:#26215C;
    --mix:#2563EB;--mix-bg:#EFF6FF;--mix-txt:#1e3a8a;

  .header{background:var(--brand);border-radius:var(--radius);padding:20px 24px;

  .crumb-item.fb{background:var(--rev-bg);color:var(--rev-txt)}
  .crumb-item.fc{background:var(--mix-bg);color:var(--mix-txt)}

  .q-eye{font-size:11px;color:var(--text3);margin-bottom:6px;

  .q-warning{font-size:12px;color:var(--cond-txt);background:var(--cond-bg);

  .btn-row{display:flex;flex-wrap:wrap;gap:8px}
  .btn{padding:9px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);

  .btn.no{border-color:var(--no);color:var(--no-txt)}.btn.no:hover{background:var(--no-bg)}
  .btn.rev{border-color:var(--rev);color:var(--rev-txt)}.btn.rev:hover{background:var(--rev-bg)}

  .result-icon{font-size:22px;flex-shrink:0;margin-top:2px}
  .result-title{font-size:16px;font-weight:700;margin-bottom:3px}

  .t-rev{color:var(--rev-txt)}.t-mix{color:var(--mix-txt)}
  .t-cond{color:var(--cond-txt)}.t-nc{color:var(--text3)}

  .lv-no{background:var(--no-bg);color:var(--no-txt)}
  .lv-rev{background:var(--rev-bg);color:var(--rev-txt)}
  .lv-cond{background:var(--cond-bg);color:var(--cond-txt)}
  .lv-na{background:var(--bg3);color:var(--text3)}

  .reason{padding:14px 20px;background:var(--bg);

           color:var(--text2);line-height:1.6}
  .insight{margin-top:10px;padding:10px 14px;background:var(--rev-bg);

  .state-row{font-size:11px;margin-bottom:2px}
  .state-tier{font-size:10px;color:var(--text3);margin-top:3px;font-style:italic}
  .sc-yes{color:var(--yes-txt);font-weight:600}
  .sc-no{color:var(--no-txt);font-weight:600}
  .sc-rev{color:var(--rev-txt);font-weight:600}
  .sc-cond{color:var(--cond-txt);font-weight:600}
  .sc-na{color:var(--text3)}
  .bg-yes{background:var(--yes-bg);border-color:#a7dfc9}
  .bg-no{background:var(--no-bg);border-color:#f5c6b4}
  .bg-rev{background:var(--rev-bg);border-color:#c4bff7}
  .bg-cond{background:var(--cond-bg);border-color:#fbbf24}
  .bg-na{background:var(--bg2)}

         font-size:11px;color:var(--text3);font-style:italic;line-height:1.6}
  .restart-row{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
  .btn-new{padding:9px 18px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);
            background:var(--bg);color:var(--text2);font-size:13px;cursor:pointer;font-weight:500}
  .btn-new:hover{background:var(--bg2)}
  .footer{margin-top:32px;text-align:center;font-size:11px;color:var(--text3);line-height:1.7}
</style>
</head>
<body>
<div id="gate" style="display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <div style="background:#fff;border:1px solid #d1d1d6;border-radius:16px;padding:40px 36px;
    max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center">
    <div style="font-size:28px;margin-bottom:8px">🔒</div>
    <div style="font-size:20px;font-weight:700;color:#1F4E79;margin-bottom:6px">Oppy EPR Tool</div>
    <div style="font-size:13px;color:#8e8e93;margin-bottom:28px">
      Enter the access code to continue
    </div>
    <input id="pw" type="password" placeholder="Access code"
      style="width:100%;padding:11px 14px;border:1.5px solid #d1d1d6;border-radius:10px;
        font-size:15px;outline:none;margin-bottom:12px;box-sizing:border-box"
      onkeydown="if(event.key==='Enter')check()"
      onfocus="this.style.borderColor='#1F4E79'"
      onblur="this.style.borderColor='#d1d1d6'"/>
    <div id="err" style="font-size:12px;color:#D85A30;margin-bottom:10px;min-height:16px"></div>
    <button onclick="check()"
      style="width:100%;padding:12px;background:#1F4E79;color:#fff;border:none;
        border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">
      Continue
    </button>
    <div style="font-size:11px;color:#c7c7cc;margin-top:20px">
      Clearyst · Oppy US EPR Obligation Assessment · CY2025
    </div>
  </div>
</div>
<script>
function check(){
  const v=document.getElementById('pw').value;
  // SHA-256 of password compared client-side — change HASH below to match your chosen password
  // To generate a new hash: open browser console and run:
  // crypto.subtle.digest('SHA-256',new TextEncoder().encode('yourpassword')).then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
  const HASH='PLACEHOLDER_HASH';
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(v))
    .then(b=>{
      const h=[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
      if(h===HASH){
        document.getElementById('gate').style.display='none';
        document.getElementById('root').style.display='block';
      } else {
        document.getElementById('err').textContent='Incorrect access code. Please try again.';
        document.getElementById('pw').value='';
        document.getElementById('pw').focus();
      }
    });
}
</script>

  if(outcome==='YES') return 'MD Tier 1 (own brand) or Tier 2 (licensee→mfg)';

  // CHANGE 2: CA licensed brand → REVIEW-CONDITION (exclusivity)
  let p, pc;
  if(ca){
    // Non-exclusive licence confirmed → Oppy fails CA Tier 1 (§18980.1.1(c)(1))

    p = 'NO — brand owner is CA Tier 2 (§42041(w)(2))';
    pc = 'no';
  } else if(co_or_me){
    p = 'YES'; pc = 'yes';
  } else {
    p = 'REVIEW — consumer-sale test'; pc = 'rev';
  }

  // CHANGE 4: MD Tier 3 note
  let tier;
  if(ca) tier = 'CA Tier 2 = brand owner (§42041(w)(2)). Oppy fails Tier 1 (non-exclusive) and Tier 2 (not brand owner).';

  else if(st==='MD') tier = 'MD 5-tier: Tier 2 (licensee→consumers?) or Tier 3 (brand owner)';
  else tier = 'Tier 2 (REVIEW — consumer-sale test)';

  return [st, {
    p, pc,
    s: pc==='yes'?'YES':(pc==='cond'?'REVIEW — confirm exclusivity':'REVIEW'),
    sc: pc,
    t: tertYes?(CA_OR.has(st)?'YES — Oppy applied tertiary':'Not in scope'):'NO — not applied by Oppy',

  }];
}));

// ── APP ───────────────────────────────────────────────────────────────────────
const STEPS=11;
const POS={A1:1,A2:2,A3:3,A3_SEC:3,A3_SEC_B:4,A3_TERT:3,A3_TERT_B2B:4,A4:5,A4b:5,
           B1:6,B2:7,B3:8,B3_LIC_YES:8,B3_US:8,B3_FOR:8,B3_GEN:8,B3_UNCLASS:8,
           C1_PL:9,C1_YES_ALL:9,C1_LIC_OWN:9,C1_NO_ALL:9,C1_REVIEW_ALL:9,C1_GRAPE:9};

const fl=id=>id?.startsWith('A')?'Filter A — Covered materials':
              id?.startsWith('B')?'Filter B — Producer determination':
              id?.startsWith('C')?'Filter C — Packaging application':'Result';
const fc=id=>id?.startsWith('A')?'fa':id?.startsWith('B')?'fb':'fc';
const icons={yes:'✅',no:'❌',nc:'⊘',mixed:'◑',review:'⚠️',cond:'🔍'};
const hdrMap={yes:'hdr-yes',no:'hdr-no',nc:'hdr-nc',mixed:'hdr-mix',review:'hdr-rev',cond:'hdr-cond'};
const tMap={yes:'t-yes',no:'t-no',nc:'t-nc',mixed:'t-mix',review:'t-rev',cond:'t-cond'};

function App() {
  const [node, setNode] = useState('A1');
  const [outKey, setOutKey] = useState(null);
  const [hist, setHist] = useState([]);

  function pick(nodeId, choice) {
    const lbl=choice.l.length>50?choice.l.slice(0,50)+'…':choice.l;
    setHist(h=>[...h,{l:lbl,f:fc(nodeId)}]);
    if(OUTCOMES[choice.n]){setOutKey(choice.n);setNode(null);}
    else if(NODES[choice.n]){setNode(choice.n);setOutKey(null);}
  }
  function restart(){setNode('A1');setOutKey(null);setHist([]);}

  const nd=node?NODES[node]:null;
  const out=outKey?OUTCOMES[outKey]:null;
  const step=POS[node]||(out?STEPS:1);
  const segs=Array.from({length:STEPS},(_,i)=>
    out?'done':i+1<step?'done':i+1===step?'active':'');

  return (
    <div>
      <div className="header">
        <h1>Oppy US EPR Obligation Decision Tree</h1>
        <p>Two-filter assessment: Covered Materials (A) → Producer Determination (B) → Packaging Application (C)<br/>
           7 EPR states: CA · CO · OR · ME · MD · MN · WA</p>
        <div className="ver-badge">v5 — Verified: OR SB 582-B · MD SB 901 · CA §18980.1.1 · CA licensed brands: non-exclusive → brand owner is CA Tier 2 · CO/MN/WA B2B tertiary excluded (Oppy B2B only) · Pending: CO 6 CCR · MN §115A.1441 · WA SB5284 · ME deferred</div>
      </div>

      <div className="prog-wrap">
        <div className="prog-bar">{segs.map((s,i)=><div key={i} className={`prog-seg ${s}`}/>)}</div>
        <div className="prog-label">{out?'Result':fl(node)}</div>
      </div>
      <div className="crumb">{hist.map((h,i)=><span key={i} className={`crumb-item ${h.f}`}>{h.l}</span>)}</div>

      {nd && (
        <div className="q-card">
          <div className="q-eye">{nd.ey}</div>
          <div className="q-text">{nd.q}</div>
          {nd.hint && <div className="q-hint">{nd.hint}{nd.ex&&<div className="q-ex">{nd.ex}</div>}</div>}
          {nd.warning && <div className="q-warning">⚠️ {nd.warning}</div>}
          <div className="btn-row">
            {nd.choices.map((ch,i)=>(
              <button key={i} className={`btn ${ch.c}`} onClick={()=>pick(node,ch)}>{ch.l}</button>
            ))}
          </div>
          {hist.length>0&&<button className="btn-restart" onClick={restart}>↩ Start over</button>}
        </div>
      )}

      {out && (
        <>
          <div className="result">
            <div className={`result-hdr ${hdrMap[out.hd]}`}>
              <div className="result-icon">{icons[out.hd]||'◑'}</div>
              <div>
                <div className={`result-title ${tMap[out.hd]}`}>{out.title}</div>
                <div className="result-sub">Primary (P) · Secondary (S) · Tertiary (T) shown per state</div>
              </div>
            </div>

            <div className="lvl-band">
              {['Primary','Secondary','Tertiary'].map((lv,i)=>{
                const v=[out.lv.p,out.lv.s,out.lv.t][i];
                return <div key={lv} className="lvl-pill">
                  <div className="lvl-label">{lv}</div>
                  <div className={`lvl-val ${lvbg(v)}`}>{v}</div>
                </div>;
              })}
            </div>

            <div className="reason">
              <div>{out.reason}</div>
              {out.condition && <div className="condition">🔍 <strong>Condition required: </strong>{out.condition}</div>}
              {out.insight   && <div className="insight">💡 <strong>Key principle: </strong>{out.insight}</div>}
              {/* CHANGE 6: MD/MN/WA pending note */}
              <div className="pending">📋 <strong>Verification status: </strong>
                OR and MD verified against primary bill text this session.
                CA verified against final regulation text (CalRecycle May 5 2026).
                CO 6 CCR 1007-2, MN §115A.1441, and WA SB5284 are treated as similar to CO
                pending full primary-source verification. ME deferred.
              </div>
            </div>

            <div className="state-grid">
              {Object.entries(out.states).map(([st,sd])=>{
                const over=sd.pc==='yes'||sd.tc==='yes'||sd.sc==='yes'?'bg-yes':
                           sd.pc==='cond'||sd.tc==='cond'?'bg-cond':
                           sd.pc==='rev'||sd.tc==='rev'?'bg-rev':
                           sd.pc==='no'&&(sd.tc==='no'||sd.tc==='na')?'bg-no':'bg-na';
                return <div key={st} className={`state-cell ${over}`}>
                  <div className="state-name">{st}</div>
                  <div className={`state-row ${oc(sd.pc)}`}>P: {sd.p}</div>
                  {sd.s!==undefined&&<div className={`state-row ${oc(sd.sc)}`}>S: {sd.s}</div>}
                  <div className={`state-row ${oc(sd.tc)}`}>T: {sd.t}</div>
                  {sd.tier&&<div className="state-tier">{sd.tier}</div>}
                </div>;
              })}
            </div>

            <div className="cite">📖 {out.cite}</div>
          </div>

          <div className="restart-row">
            <button className="btn-new" onClick={restart}>↩ Classify another item</button>
          </div>
        </>
      )}

      <div className="footer">
        Oppy EPR Obligation Assessment · CY2025 · For internal compliance use only<br/>
        Verified statutes: CA SB 54 Final Reg (May 5 2026) · OR SB 582-B (2021) · MD SB 901 (2025)<br/>
        CO/MN/WA B2B tertiary: excluded (Oppy sells B2B only — DTC not applicable) · CO 6 CCR, MN §115A.1441, WA SB5284 pending full verification<br/>
        ME deferred · Last updated: June 2026
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
